                content: `# Regulación de Casinos en México: Estructura Normativa y Autoridades Competentes

## Marco Legal Aplicable

La regulación de casinos en México descansa en un andamiaje normativo federal y estatal que combina:

- **Ley Federal de Juegos y Sorteos** (LFJS) - Marco principal
- **Reglamento de la Ley Federal de Juegos y Sorteos** - Especificaciones técnicas
- **Disposiciones Locales** - Requisitos por entidad federativa
- **Reforma de la LFPIORPI** (DOF 16-07-2025) - Requisitos PLD/AML
- **Anexo 17 del RMF 2026** - Reportes a SAT

## Sistema de Autoridades Competentes

### DGJS (Dirección General de Juegos y Sorteos)

**Función**: Autoridad federal reguladora bajo SEGOB

**Competencias principales:**
- Otorgamiento y revocación de permisos de operador
- Emisión de licencias por establecimiento
- Autorización de cambios de ubicación o modificaciones
- Supervisión técnica de máquinas y sistemas
- Imposición de sanciones administrativas
- Vigilancia de cumplimiento normativo integral

### UIF (Unidad de Inteligencia Financiera)

**Función**: Supervisión del cumplimiento PLD/AML bajo SHCP

**Competencias:**
- Recepción de Reportes de Operación Sospechosa (ROS)
- Análisis de estructuras de lavado de dinero
- Imposición de multas por incumplimiento LFPIORPI
- Coordinación internacional en materia antilavado

### Autoridades Estatales

Cada entidad federativa cuenta con regulador local (ej: ALEGJ en Sonora) que supervisa:
- Cumplimiento de leyes estatales
- Cobro de impuestos locales
- Inspección física periódica

### SAT (Servicio de Administración Tributaria)

- Supervisión del cumplimiento tributario
- Auditoría de cálculos de IEPS e impuestos locales
- Validación de reportes vía Anexo 17

## Requisitos Para Obtener Permiso de Operador

### 1. Capacidad Jurídica
- Constitución como persona moral (SA u otra)
- Poder notarial de apoderados
- Acta constitutiva que incluya objeto de juegos

### 2. Capacidad Financiera
- Estados financieros auditados (últimos 3 años)
- Comprobante de disponibilidad de recursos
- Origen legal de fondos documentado
- Patrimonio mínimo según DGJS

### 3. Obligaciones Operacionales Críticas

**Operacionales**
- Horarios conforme a regulaciones estatales
- Acceso restringido a menores de edad
- Capacitación certificada del personal (mínimo anual)
- Sistemas de seguridad física y tecnológica

**Reportes y Cumplimiento**

- **Reportes a UIF**: ROS en plazo 5 días hábiles, operaciones conexas
- **Reportes a SAT**: Anexo 17 con cálculos de IEPS
- **Auditoría anual**: Dictamen de contador público

## Conclusión

La regulación de casinos en México es rigurosa pero predecible. El éxito operacional depende de comprensión profunda del marco normativo, implementación de sistemas de compliance de alta calidad, relación constructiva con autoridades e inversión sostenida en cumplimiento normativo.`,

## Introducción: Naturaleza del Trámite

                content: `# Impuestos en Gaming: IEPS 50%, Erogaciones y Riesgo de Piramidación

## Reforma Fiscal 2025: Cambios Principales

La reforma fiscal publicada en DOF 2024 introdujo cambios significativos en tributación de gaming:

**IEPS en Juegos y Sorteos (Artículo 20 LIEPS):**
- **Tasa**: 50% (AUMENTO de 30% anterior)
- **Base**: Ingresos brutos del operador
- **Carácter**: Trasladable al jugador conforme criterio SCJN
- **Pago**: Mensual ante SAT vía Anexo 17 RMF 2026

## Estructura Tributaria de Casinos

### 1. Impuesto Especial sobre Producción y Servicios (IEPS)

**Hecho Gravado:** Ingresos brutos derivados de operación de juegos de azar

**Fórmula de Cálculo:**
IEPS = (Apuestas Totales - Premios Pagados) × 50%

**Ejemplo Práctico:**
- Apuestas recibidas en mes: $10,000,000
- Premios pagados a jugadores: $8,000,000
- **Ingreso Bruto**: $2,000,000
- **IEPS a tasa 50%**: $1,000,000

Aplicación múltiple de impuestos en cascada sobre la misma base imponible.

- **IEPS es trasladable**: El IEPS es un impuesto trasladable al jugador
- **No constituye costo**: Por tanto, no reduce base de ISR del operador
- **Erogaciones es legítimo**: Es gravamen local legítimo

## Conclusión

                                        </div>
                                        <h3 className="post-title">{post.title}</h3>
                                        <p className="post-excerpt">{post.excerpt}</p>
                                        <div className="post-footer">
                                            <span className="post-date">{new Date(post.date).toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                            <span style={{ color: '#2a5298', fontWeight: '600', fontSize: '0.9rem' }}>Leer más →</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="empty-state">
                            <p>No se encontraron artículos con esos criterios.</p>
                            <p style={{ fontSize: '0.95rem', color: '#95a5a6' }}>Intenta con otros términos de búsqueda.</p>
                        </div>
                    )}
                </div>
            );
        }

        function PostDetail({ post, onBack }) {
            if (!post) return null;

            const renderContent = (content) => {
                return content.split('\n').map((line, i) => {
                    if (line.startsWith('# ')) {
                        return <h2 key={i}>{line.replace('# ', '')}</h2>;
                    } else if (line.startsWith('## ')) {
                        return <h3 key={i}>{line.replace('## ', '')}</h3>;
                    } else if (line.startsWith('- ')) {
                        return <li key={i}>{line.replace('- ', '')}</li>;
                    } else if (line.trim() === '') {
                        return <div key={i} style={{ height: '0.5rem' }}></div>;
                    } else {
                        return <p key={i}>{line}</p>;
                    }
                });
            };

            return (
                <div className="container">
                    <div className="post-detail">
                        <div className="post-detail-header">
                            <button className="post-detail-back" onClick={onBack}>
                                ← Volver a artículos
                            </button>
                            <h1>{post.title}</h1>
                            <div className="post-detail-meta">
                                <div className="post-detail-meta-item">
                                    ✍️ <span>{post.author}</span>
                                </div>
                                <div className="post-detail-meta-item">
                                    📅 <span>{new Date(post.date).toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                </div>
                                <div className="post-detail-meta-item">
                                    📂 <span style={{ backgroundColor: '#2a5298', color: 'white', padding: '0.25rem 0.75rem', borderRadius: '20px' }}>{post.category}</span>
                                </div>
                            </div>
                        </div>

                        <div className="post-detail-body">
                            <img src={post.image} alt={post.title} style={{ width: '100%', borderRadius: '8px' }} />
                            
                            <div>
                                {renderContent(post.content)}
                            </div>

                            <CommentSection postId={post.id} initialCommentCount={post.commentCount} />
                        </div>
                    </div>
                </div>
            );
        }

        function CommentSection({ postId }) {
            const [comments, setComments] = useState([]);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                text: ''
            });

            const commentsKey = `comments_post_${postId}`;

            useEffect(() => {
                const savedComments = localStorage.getItem(commentsKey);
                if (savedComments) {
                    try {
                        setComments(JSON.parse(savedComments));
                    } catch (e) {
                        console.error('Error parsing comments:', e);
                    }
                }
            }, [postId, commentsKey]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleSubmitComment = (e) => {
                e.preventDefault();
                
                if (!formData.name.trim() || !formData.email.trim() || !formData.text.trim()) {
                    alert('Por favor completa todos los campos');
                    return;
                }

                const newComment = {
                    id: Date.now(),
                    name: formData.name,
                    email: formData.email,
                    text: formData.text,
                    date: new Date().toISOString()
                };

                const updatedComments = [...comments, newComment];
                setComments(updatedComments);
                localStorage.setItem(commentsKey, JSON.stringify(updatedComments));

                setFormData({
                    name: '',
                    email: '',
                    text: ''
                });
            };

            return (
                <div className="comments-section">
                    <h2>💬 Comentarios ({comments.length})</h2>

                    <div className="comment-form">
                        <h3>Deja tu comentario</h3>
                        <form onSubmit={handleSubmitComment}>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1rem' }}>
                                <div className="form-group">
                                    <label htmlFor="name">Nombre</label>
                                    <input
                                        id="name"
                                        type="text"
                                        name="name"
                                        value={formData.name}
                                        onChange={handleInputChange}
                                        placeholder="Tu nombre"
                                    />
                                </div>
                                <div className="form-group">
                                    <label htmlFor="email">Email</label>
                                    <input
                                        id="email"
                                        type="email"
                                        name="email"
                                        value={formData.email}
                                        onChange={handleInputChange}
                                        placeholder="tu@email.com"
                                    />
                                </div>
                            </div>

                            <div className="form-group">
                                <label htmlFor="text">Comentario</label>
                                <textarea
                                    id="text"
                                    name="text"
                                    value={formData.text}
                                    onChange={handleInputChange}
                                    placeholder="Comparte tu opinión o pregunta..."
                                />
                            </div>

                            <button type="submit" className="btn btn-primary">
                                Publicar comentario
                            </button>
                        </form>
                    </div>

                    {comments.length > 0 ? (
                        <div className="comments-list">
                            {comments.map(comment => (
                                <div key={comment.id} className="comment">
                                    <div className="comment-header">
                                        <span className="comment-author">{comment.name}</span>
                                        <span className="comment-date">
                                            {new Date(comment.date).toLocaleDateString('es-MX', { 
                                                year: 'numeric', 
                                                month: 'short', 
                                                day: 'numeric',
                                                hour: '2-digit',
                                                minute: '2-digit'
                                            })}
                                        </span>
                                    </div>
                                    <p className="comment-text">{comment.text}</p>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div style={{ padding: '2rem', textAlign: 'center', color: '#95a5a6' }}>
                            <p>Aún no hay comentarios. ¡Sé el primero en comentar!</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
